name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: packages/prisml/python/requirements.txt

      - name: Install Python ML dependencies
        run: pip install -q -r packages/prisml/python/requirements.txt

      - name: Verify Python ML stack
        run: |
          python -c "
          import numpy, sklearn, skl2onnx, onnx
          print('numpy       ', numpy.__version__)
          print('scikit-learn', sklearn.__version__)
          print('skl2onnx    ', skl2onnx.__version__)
          print('onnx        ', onnx.__version__)
          "

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/prisml
        run: pnpm build

      - name: Test
        working-directory: packages/prisml
        run: pnpm test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: packages/prisml
        run: pnpm lint

  website:
    name: Website Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @vncsleal/prisml
        working-directory: packages/prisml
        run: pnpm build

      - name: Install website dependencies
        working-directory: apps/website
        run: npm ci

      - name: Build website
        working-directory: apps/website
        run: npm run build
