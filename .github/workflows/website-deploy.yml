name: Website Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: website-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Website
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://scheml.vercel.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Vercel secrets
        run: |
          missing=0
          for key in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub Actions secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build @vncsleal/scheml
        working-directory: packages/scheml
        run: pnpm build

      - name: Build website
        working-directory: apps/website
        run: pnpm build

      - name: Prune prebuilt native binaries
        run: |
          find apps/website/.vercel/output -path '*onnxruntime-node/bin/napi-v6/darwin*' -prune -exec rm -rf {} +
          find apps/website/.vercel/output -path '*onnxruntime-node/bin/napi-v6/win32*' -prune -exec rm -rf {} +
          find apps/website/.vercel/output -path '*onnxruntime-node/bin/napi-v6/linux/arm64*' -prune -exec rm -rf {} +
          find apps/website/.vercel/output -path '*@img/sharp-darwin-*' -prune -exec rm -rf {} +
          find apps/website/.vercel/output -path '*@img/sharp-libvips-darwin-*' -prune -exec rm -rf {} +
          find apps/website/.vercel/output -path '*@img/sharp-win32-*' -prune -exec rm -rf {} +
          find apps/website/.vercel/output -path '*@img/sharp-libvips-win32-*' -prune -exec rm -rf {} +
          find apps/website/.vercel/output -path '*@img/sharp-linux-arm64*' -prune -exec rm -rf {} +
          find apps/website/.vercel/output -path '*@img/sharp-libvips-linux-arm64*' -prune -exec rm -rf {} +

      - name: Normalize prebuilt Vercel runtime
        run: |
          node -e "const fs=require('fs'); const path='apps/website/.vercel/output/functions/_render.func/.vc-config.json'; const json=JSON.parse(fs.readFileSync(path,'utf8')); json.runtime='nodejs20.x'; fs.writeFileSync(path, JSON.stringify(json, null, 2) + '\n');"
          rm -rf .vercel/output
          mkdir -p .vercel
          cp -R apps/website/.vercel/output .vercel/output

      - name: Deploy website to Vercel
        run: pnpm dlx vercel@48.9.1 deploy --prebuilt --archive=tgz --prod --yes --token="$VERCEL_TOKEN"
